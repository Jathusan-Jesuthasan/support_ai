version: '3.8'

services:
  # MongoDB Atlas / local emulation store
  mongodb:
    image: mongo:6.0
    container_name: supportai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - supportai_network

  # Redis caching & messaging queue
  redis:
    image: redis:7.0-alpine
    container_name: supportai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - supportai_network

  # Main FastAPI Application Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supportai_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/supportai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET_KEY=ReplaceWithAReallySecureRandomSecretKeyString123!
      - GEMINI_API_KEY=AIzaSyDummyKeyForTesting
    depends_on:
      - mongodb
      - redis
    networks:
      - supportai_network

  # Celery Background Ingestion Task Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supportai_celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/supportai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET_KEY=ReplaceWithAReallySecureRandomSecretKeyString123!
    depends_on:
      - mongodb
      - redis
    networks:
      - supportai_network

  # Celery Beat Periodic Scheduler
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supportai_celery_beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/supportai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET_KEY=ReplaceWithAReallySecureRandomSecretKeyString123!
    depends_on:
      - mongodb
      - redis
    networks:
      - supportai_network

volumes:
  mongodb_data:
  redis_data:

networks:
  supportai_network:
    driver: bridge
